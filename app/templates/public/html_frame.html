<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{{ page_title or "网页预览" }} · {{ product_name }}</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }

      iframe {
        border: 0;
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <iframe
      sandbox
      referrerpolicy="no-referrer"
      srcdoc="{{ srcdoc | e }}"
      title="邮件网页正文预览"
    ></iframe>
  </body>
</html>

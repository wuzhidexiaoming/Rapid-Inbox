<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HTML Preview - Rapid Inbox</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }

      iframe {
        border: 0;
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <iframe
      sandbox
      referrerpolicy="no-referrer"
      srcdoc="{{ srcdoc | e }}"
      title="Message HTML preview"
    ></iframe>
  </body>
</html>

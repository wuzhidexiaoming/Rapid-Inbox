<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "首页" }} · {{ product_name }}</title>

    <link rel="stylesheet" href="{{ url_for('static', path='vendor/fonts/rapid-inbox-fonts.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='vendor/normalize/normalize.css') }}" />
    <script src="{{ url_for('static', path='vendor/lucide/lucide.min.js') }}" defer></script>

    <style>
      :root {
        color-scheme: light;
        --bg: #faf9f5;
        --bg-elevated: #ffffff;
        --bg-subtle: #f4f2e8;
        --bg-hover: #ede9d8;

        --text: #1f1e1d;
        --text-secondary: #4d4b46;
        --text-muted: #7a7770;
        --text-faint: #a09c92;

        --border: #e7e2d0;
        --border-strong: #d6d0b9;
        --border-faint: #efebd9;

        --accent: #c15f3c;
        --accent-strong: #a04428;
        --accent-soft: #f7ece3;
        --accent-faint: #fcf6f1;

        --success: #4f7d4a;
        --success-strong: #3a6537;
        --success-soft: #ebf2e6;

        --warning: #b08329;
        --warning-strong: #8c6620;
        --warning-soft: #f5edd4;

        --danger: #b14343;
        --danger-strong: #8e3030;
        --danger-soft: #f6e2dd;

        --info: #4a6b80;
        --info-soft: #e3eaef;

        --radius-sm: 6px;
        --radius: 10px;
        --radius-lg: 14px;
        --radius-xl: 20px;

        --shadow-xs: 0 1px 2px rgba(31, 30, 29, 0.04);
        --shadow-sm: 0 2px 6px rgba(31, 30, 29, 0.05);
        --shadow: 0 4px 14px rgba(31, 30, 29, 0.05);
        --shadow-lg: 0 18px 36px rgba(31, 30, 29, 0.08);
        --shadow-focus: 0 0 0 3px rgba(193, 95, 60, 0.18);

        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-serif: 'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif;
        --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, ui-monospace, monospace;
      }

      *, *::before, *::after { box-sizing: border-box; }
      html { min-width: 320px; }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 0.95rem;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a { color: inherit; text-decoration: none; }
      a:hover { color: var(--accent-strong); }

      button, input { font: inherit; color: inherit; letter-spacing: 0; }
      button { cursor: pointer; }
      svg { flex: 0 0 auto; }
      code, pre, kbd { font-family: var(--font-mono); }

      h1, h2, h3, h4 {
        margin: 0;
        color: var(--text);
        font-family: var(--font-serif);
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      h1 { font-size: 2.4rem; line-height: 1.1; }
      h2 { font-size: 1.55rem; line-height: 1.2; }
      h3 { font-size: 1.1rem; line-height: 1.3; }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .text-muted { color: var(--text-muted); }
      .mono { font-family: var(--font-mono); }

      /* Header */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 30;
        background: rgba(250, 249, 245, 0.85);
        backdrop-filter: saturate(140%) blur(12px);
        -webkit-backdrop-filter: saturate(140%) blur(12px);
        border-bottom: 1px solid var(--border-faint);
      }

      .site-shell {
        width: min(1180px, calc(100% - 36px));
        margin: 0 auto;
      }

      .site-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 68px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        font-family: var(--font-serif);
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .brand-mark {
        display: inline-flex;
        width: 36px;
        height: 36px;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent) 0%, #d97757 100%);
        color: #fff;
        box-shadow: var(--shadow-sm);
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .nav-link {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        gap: 6px;
        padding: 0 14px;
        border-radius: 8px;
        color: var(--text-secondary);
        font-size: 0.92rem;
        font-weight: 500;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .nav-link:hover {
        background: var(--bg-subtle);
        color: var(--text);
      }
      .nav-link svg { width: 15px; height: 15px; opacity: 0.85; }

      /* Main */
      .page-main { flex: 1; padding-bottom: 32px; }
      .page-shell {
        width: min(1180px, calc(100% - 36px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 16px;
        border: 1px solid transparent;
        border-radius: 10px;
        background: var(--bg-elevated);
        color: var(--text);
        font-size: 0.94rem;
        font-weight: 500;
        line-height: 1;
        text-decoration: none;
        transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, color 0.15s ease, transform 0.05s ease;
      }
      .btn:hover { background: var(--bg-hover); }
      .btn:active { transform: translateY(0.5px); }
      .btn svg { width: 16px; height: 16px; }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
        color: #fff;
      }

      .btn-secondary {
        border-color: var(--border-strong);
        background: var(--bg-elevated);
        color: var(--text-secondary);
      }
      .btn-secondary:hover {
        background: var(--bg-hover);
        color: var(--text);
      }

      .btn-subtle {
        background: var(--bg-subtle);
        color: var(--text-secondary);
      }
      .btn-subtle:hover {
        background: var(--bg-hover);
        color: var(--text);
      }

      .btn:focus-visible,
      .icon-btn:focus-visible,
      .nav-link:focus-visible,
      input:focus-visible,
      summary:focus-visible {
        outline: none;
        box-shadow: var(--shadow-focus);
      }

      .icon-btn {
        display: inline-flex;
        width: 42px;
        height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        background: var(--bg-elevated);
        color: var(--text-secondary);
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }
      .icon-btn:hover {
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      /* Surfaces */
      .surface {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xs);
      }

      /* Badges */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 24px;
        padding: 2px 10px;
        border-radius: 999px;
        background: var(--bg-subtle);
        color: var(--text-secondary);
        font-size: 0.8rem;
        font-weight: 500;
        line-height: 1.3;
        white-space: nowrap;
      }

      .badge-success { background: var(--success-soft); color: var(--success-strong); }
      .badge-warning { background: var(--warning-soft); color: var(--warning-strong); }
      .badge-danger { background: var(--danger-soft); color: var(--danger-strong); }

      .button-row, .tag-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      /* Footer */
      .site-footer {
        border-top: 1px solid var(--border-faint);
        background: rgba(250, 249, 245, 0.6);
        color: var(--text-muted);
      }

      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 76px;
        font-size: 0.86rem;
      }

      .footer-links {
        display: flex;
        gap: 14px;
      }
      .footer-links a {
        color: var(--text-secondary);
        font-weight: 500;
      }
      .footer-links a:hover { color: var(--text); }

      /* Inputs */
      input[type="text"],
      input[type="email"],
      input[type="search"] {
        width: 100%;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        background: var(--bg-elevated);
        color: var(--text);
        font-size: 0.96rem;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      input::placeholder { color: var(--text-faint); }

      input:focus {
        border-color: var(--accent);
        box-shadow: var(--shadow-focus);
        outline: none;
      }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(31, 30, 29, 0.16);
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(31, 30, 29, 0.28); background-clip: content-box; border: 2px solid transparent; }

      @media (max-width: 720px) {
        .site-nav { min-height: 60px; }
        .brand-text { display: none; }
        .nav-link { padding: 0 10px; }
        .page-shell { padding-top: 24px; }
        .footer-inner {
          flex-direction: column;
          align-items: flex-start;
          padding: 18px 0;
        }
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="site-header">
      <div class="site-shell">
        <nav class="site-nav" aria-label="公开页面导航">
          <a class="brand" href="/">
            <span class="brand-mark" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="m3 7 9 7 9-7"></path>
              </svg>
            </span>
            <span class="brand-text">{{ product_name }}</span>
          </a>
          <div class="nav-links">
            <a class="nav-link" href="/docs" target="_blank" rel="noreferrer">
              <i data-lucide="file-text"></i>API
            </a>
            <a class="nav-link" href="/admin/login">
              <i data-lucide="shield"></i>管理
            </a>
          </div>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="page-shell">
        {% block hero %}{% endblock %}
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-shell footer-inner">
        <div>{{ product_name }} · 仅供测试与开发用途</div>
        <div class="footer-links">
          <a href="/docs" target="_blank" rel="noreferrer">API 文档</a>
          <a href="/admin/login">管理台</a>
        </div>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>

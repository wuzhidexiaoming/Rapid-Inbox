<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title or "首页" }} - {{ product_name }}</title>
  <style>
    :root {
      --page: #f6f8fa;
      --surface: #ffffff;
      --surface-soft: #eef3f2;
      --surface-strong: #20262d;
      --ink: #20262d;
      --muted: #64717f;
      --muted-strong: #44505c;
      --line: #dce3e8;
      --line-strong: #c5d0d8;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --accent-soft: #dff3ef;
      --blue: #2563eb;
      --green: #15803d;
      --amber: #a16207;
      --red: #b91c1c;
      --focus: rgba(15, 118, 110, 0.22);
      --shadow: 0 18px 40px rgba(32, 38, 45, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    svg {
      flex: 0 0 auto;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .site-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 1rem;
      font-weight: 760;
      text-decoration: none;
      white-space: nowrap;
    }

    .brand-mark {
      display: inline-flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--surface-strong);
      color: #fff;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      color: var(--muted-strong);
      padding: 0 12px;
      text-decoration: none;
      font-size: 0.94rem;
      font-weight: 650;
    }

    .nav-link:hover {
      background: var(--surface-soft);
      color: var(--ink);
    }

    .page-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .page-main {
      min-height: calc(100vh - 176px);
    }

    .btn {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 14px;
      color: var(--ink);
      background: var(--surface);
      text-decoration: none;
      font-weight: 720;
      line-height: 1;
      transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, color 0.16s ease;
    }

    .btn:hover {
      border-color: var(--line-strong);
      box-shadow: 0 8px 20px rgba(32, 38, 45, 0.08);
    }

    .btn:focus-visible,
    .icon-btn:focus-visible,
    input:focus-visible,
    summary:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .btn-secondary {
      border-color: var(--line);
      background: var(--surface);
      color: var(--muted-strong);
    }

    .btn-danger {
      background: #fff4f2;
      border-color: #f0c7c2;
      color: var(--red);
    }

    .icon-btn {
      display: inline-flex;
      width: 40px;
      height: 40px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted-strong);
    }

    .icon-btn:hover {
      border-color: var(--line-strong);
      color: var(--ink);
      box-shadow: 0 8px 20px rgba(32, 38, 45, 0.08);
    }

    .surface {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted-strong);
      padding: 0 10px;
      font-size: 0.82rem;
      font-weight: 720;
      white-space: nowrap;
    }

    .badge-success {
      border-color: #bbdfc5;
      background: #eefaf2;
      color: var(--green);
    }

    .badge-warning {
      border-color: #e6d29a;
      background: #fff8e8;
      color: var(--amber);
    }

    .badge-danger {
      border-color: #e9bbb5;
      background: #fff4f2;
      color: var(--red);
    }

    .text-muted {
      color: var(--muted);
    }

    .tag-row,
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .site-footer {
      border-top: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
    }

    .footer-inner {
      display: flex;
      min-height: 72px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 0.9rem;
    }

    .footer-links {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .footer-links a {
      color: var(--muted-strong);
      text-decoration: none;
      font-weight: 650;
    }

    .footer-links a:hover {
      color: var(--ink);
    }

    @media (max-width: 720px) {
      .site-shell,
      .page-shell {
        width: min(100% - 24px, 1120px);
      }

      .site-nav {
        min-height: 58px;
      }

      .brand-text {
        display: none;
      }

      .nav-link {
        padding: 0 10px;
      }

      .page-shell {
        padding-top: 20px;
      }

      .footer-inner {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        padding: 18px 0;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-shell">
      <nav class="site-nav" aria-label="公开页面导航">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="m3 7 9 7 9-7"></path>
            </svg>
          </span>
          <span class="brand-text">{{ product_name }}</span>
        </a>
        <div class="nav-links">
          <a class="nav-link" href="/docs" target="_blank" rel="noreferrer">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
              <path d="M14 2v6h6"></path>
              <path d="M8 13h8"></path>
              <path d="M8 17h5"></path>
            </svg>
            API
          </a>
          <a class="nav-link" href="/admin/login">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 15v2"></path>
              <rect x="5" y="11" width="14" height="10" rx="2"></rect>
              <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
            </svg>
            管理
          </a>
        </div>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <div class="page-shell">
      {% block hero %}{% endblock %}
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-shell footer-inner">
      <div>{{ product_name }} · 仅供测试与开发用途</div>
      <div class="footer-links">
        <a href="/docs" target="_blank" rel="noreferrer">API 文档</a>
        <a href="/admin/login">管理台</a>
      </div>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>

{% extends "admin/base.html" %}

{% block head %}
<style>
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  
  .setting-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 1.5rem;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  
  .setting-card:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--primary);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
  }
  
  .setting-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  
  .setting-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(59, 130, 246, 0.1);
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .setting-label {
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--text);
  }
  
  .setting-value {
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 1.25rem;
    color: var(--text);
    margin: 0.5rem 0;
    word-break: break-all;
  }
  
  .setting-hint {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.5;
    margin-top: auto;
    padding-top: 1rem;
  }
</style>
{% endblock %}

{% block content %}
<section class="card" data-aos="fade-up">
  <div style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
    <h2 style="margin: 0 0 0.5rem 0;">系统运行参数</h2>
    <p class="muted" style="margin: 0; font-size: 0.95rem;">当前环境的关键运行配置，包含接收限制与后台会话参数。</p>
  </div>

  {% if settings_items %}
    <div class="settings-grid">
      {% for item in settings_items %}
        <div class="setting-card" data-aos="fade-up" data-aos-delay="{{ loop.index0 * 50 }}">
          <div class="setting-header">
            <div class="setting-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </div>
            <span class="setting-label">{{ item.label }}</span>
          </div>
          <div class="setting-value">{{ item.value }}</div>
          <div class="setting-hint">{{ item.hint }}</div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="empty-state">
      <p>当前没有可展示的系统设置</p>
    </div>
  {% endif %}
</section>
{% endblock %}

{% extends "admin/base.html" %}

{% block head %}
<style>
  .auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 65vh;
  }
  
  .auth-card {
    width: 100%;
    max-width: 420px;
    padding: 3rem 2.5rem;
    text-align: center;
  }
  
  .auth-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 12px;
    margin: 0 auto 1.5rem;
    box-shadow: 0 8px 24px var(--primary-glow);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .auth-icon svg {
    width: 24px;
    height: 24px;
    color: white;
  }
  
  .form-group {
    text-align: left;
    margin-bottom: 1.5rem;
  }
  
  .auth-form {
    margin-top: 2.5rem;
  }
  
  .submit-btn {
    width: 100%;
    padding: 0.8rem;
    font-size: 1rem;
    margin-top: 1rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card" data-aos="zoom-in" data-aos-duration="800">
    
    <div class="auth-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z" />
      </svg>
    </div>
    
    <h2>欢迎回来</h2>
    <p class="muted">请登录以访问控制台</p>

    {% if error %}
      <div class="notice" role="alert" style="margin-top: 1.5rem; text-align: left;">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/admin/login" class="auth-form">
      <div class="form-group">
        <label>
          用户名
          <input name="username" type="text" value="{{ username or '' }}" autocomplete="username" autofocus required placeholder="输入管理员账号" />
        </label>
      </div>
      <div class="form-group">
        <label>
          密码
          <input name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </label>
      </div>
      <button type="submit" class="button button--primary submit-btn">
        登录
      </button>
    </form>
  </div>
</div>
{% endblock %}
